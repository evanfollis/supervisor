# Projects to include in the 12h reflection loop.
# Format: <name>|<path>|<optional-prompt-template>
# Name is used in output file naming and telemetry filtering.
# Path must be an absolute directory (typically a git repo).
# Prompt template is optional; defaults to reflect-prompt.md. Basename is
# resolved under scripts/lib/; absolute paths are honored as-is.
# Comment out a line to skip a project without removing it.

command|/opt/workspace/projects/command
atlas|/opt/workspace/projects/atlas
skillfoundry-harness|/opt/workspace/projects/skillfoundry/skillfoundry-harness
mentor|/opt/workspace/projects/career-os/mentor
recruiter|/opt/workspace/projects/career-os/recruiter
context-repository|/opt/workspace/projects/context-repository
supervisor|/opt/workspace/supervisor|reflect-supervisor-prompt.md
