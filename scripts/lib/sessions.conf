# Persistent tmux sessions.
# Format: <tmux-name>|<cwd>|<agent>|<role>
# agent is optional — defaults to "claude". Also supported: "codex".
# role is optional — defaults to "project". Use "executive" for the principal-
# facing control-plane embodiment at workspace root.
# `ws start` reads this. workspace-session@<name>.service also reads this.
# Session name is what you type in the app / `ws-attach`.
#
# Tier model (ADR-0023 superseded by ADR-0027): synaplex.ai is the system;
# atlas + skillfoundry are pods; command is operator surface; context-repo is
# the pattern lab. synaplex added 2026-04-23 per ADR-0029.
# mentor + recruiter were removed 2026-04-18 (personal side projects on GitHub).
general|/opt/workspace|claude|executive
general-codex|/opt/workspace|codex|executive
atlas|/opt/workspace/projects/atlas|claude|project
skillfoundry|/opt/workspace/projects/skillfoundry/skillfoundry-harness|claude|project
command|/opt/workspace/projects/command|claude|project
context-repo|/opt/workspace/projects/context-repository|claude|project
synaplex|/opt/workspace/projects/synaplex|claude|project
